services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ${APP_DB_NAME:-app}
      MARIADB_USER: ${APP_DB_USER:-app}
      MARIADB_PASSWORD: ${APP_DB_PASS:-change-me}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root-change-me}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  mariadb-data:
